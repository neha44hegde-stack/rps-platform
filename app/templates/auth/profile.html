{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm" style="max-width: 400px;">
  <div class="card-body">
    <h3 class="card-title">Profile</h3>
    <p class="mb-1"><strong>Username:</strong> {{ user.username }}</p>
    <p class="mb-3"><strong>Email:</strong> {{ user.email }}</p>
    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-sm">Logout</a>
  </div>
</div>
{% endblock %}
