{% extends "base.html" %}
{% block content %}
<h2>Rock Paper Scissors</h2>
<p>Welcome, {{ current_user.username }}!</p>
<form method="POST" action="{{ url_for('game.play') }}">
    <button name="choice" value="rock">Rock</button>
    <button name="choice" value="paper">Paper</button>
    <button name="choice" value="scissors">Scissors</button>
</form>
<p><a href="{{ url_for('game.history') }}">View History</a></p>
<p><a href="{{ url_for('game.leaderboard') }}">Leaderboard</a></p>
<p><a href="{{ url_for('auth.profile') }}">Profile</a></p>
{% endblock %}
