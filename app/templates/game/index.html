{% extends "base.html" %}
{% block content %}
<div class="text-center">
    <h2>Rock Paper Scissors</h2>
    <p class="text-muted">Welcome, {{ current_user.username }}!</p>
    <form method="POST" action="{{ url_for('game.play') }}" class="d-flex justify-content-center gap-3 my-4">
        <button name="choice" value="rock" class="btn btn-lg btn-outline-primary">Rock</button>
        <button name="choice" value="paper" class="btn btn-lg btn-outline-primary">Paper</button>
        <button name="choice" value="scissors" class="btn btn-lg btn-outline-primary">Scissors</button>
    </form>
</div>
{% endblock %}
